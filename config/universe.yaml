# Curated ~130 symbol universe for phase-1 pipeline/algo validation.
# Not the full 800-1500 symbol scan from algo-spec/01-data-requirements.md --
# see algo-spec plan Open Risk #2 (survivorship bias) and #5 (reference data
# is hand-maintained at this scale, see reference_overrides.yaml).
#
# Expanded from the original ~28-symbol M0-M3 universe after the M3.5
# checkpoint (see IMPLEMENTATION.md "M3.5 status"): the D1 gate stack's joint
# pass rate is ~0.83% of symbol-days, and 28 candidate symbols produced too
# few qualifying symbol-days to ever coincide with a trigger/dip-arm event
# over 5 years (0 trades). All symbols are long-listed liquid large/mid-caps
# that existed continuously over the full backfill window (2021-07-05 to
# present) to avoid new-listing gaps.

benchmarks:
  - symbol: SPY
    role: primary
  - symbol: QQQ
    role: secondary

