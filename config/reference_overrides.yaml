# Hand-maintained reference data for the curated universe (config/universe.yaml).
# All symbols here are large/mega-cap and already satisfy the float >= 50M gate
# (G1 in algo-spec/04-stock-selection-engine.md) by construction, so per-symbol
# float is not tracked. earnings_blackout is a list of dates (YYYY-MM-DD) on
# which G8 ("no earnings today or tomorrow pre-market") should exclude the
# symbol -- update quarterly as new earnings dates are announced. Empty list
# means "not yet populated", not "no upcoming earnings" -- the earnings gate
# is best-effort in phase 1, not a guarantee.

